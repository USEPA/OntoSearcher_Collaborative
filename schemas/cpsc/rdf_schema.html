    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        
            <div id="config"></div>
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"group": 1, "id": "http://purl.bioontology.org/ontology/npo#NPO_199", "label": "NPO_199", "shape": "box", "title": "http://purl.bioontology.org/ontology/npo#NPO_199"}, {"group": 2, "id": "http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#C25464", "label": "C25464", "shape": "ellipse", "title": "http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#C25464"}, {"group": 2, "id": "http://purl.bioontology.org/ontology/npo#NPO_1808", "label": "NPO_1808", "shape": "ellipse", "title": "http://purl.bioontology.org/ontology/npo#NPO_1808"}, {"group": 2, "id": "http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#C93400", "label": "C93400", "shape": "ellipse", "title": "http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#C93400"}, {"group": 2, "id": "http://sbmi.uth.tmc.edu/ontology/ochv#C0036524", "label": "C0036524", "shape": "ellipse", "title": "http://sbmi.uth.tmc.edu/ontology/ochv#C0036524"}, {"group": 2, "id": "http://www.ebi.ac.uk/efo/EFO_0000487", "label": "EFO_0000487", "shape": "ellipse", "title": "http://www.ebi.ac.uk/efo/EFO_0000487"}, {"group": 2, "id": "http://purl.org/dc/terms/description", "label": "description", "shape": "ellipse", "title": "http://purl.org/dc/terms/description"}, {"group": 2, "id": "http://purl.obolibrary.org/obo/MESH_D012306", "label": "MESH_D012306", "shape": "ellipse", "title": "http://purl.obolibrary.org/obo/MESH_D012306"}, {"group": 2, "id": "http://www.w3.org/2000/01/rdf-schema#label", "label": "label", "shape": "ellipse", "title": "http://www.w3.org/2000/01/rdf-schema#label"}, {"group": 2, "id": "http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#C93401", "label": "C93401", "shape": "ellipse", "title": "http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#C93401"}, {"group": 2, "id": "http://purl.obolibrary.org/obo/CHMO_0000101", "label": "CHMO_0000101", "shape": "ellipse", "title": "http://purl.obolibrary.org/obo/CHMO_0000101"}, {"group": 2, "id": "http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#C43530", "label": "C43530", "shape": "ellipse", "title": "http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#C43530"}, {"group": 2, "id": "http://sbmi.uth.tmc.edu/ontology/ochv#C0034030", "label": "C0034030", "shape": "ellipse", "title": "http://sbmi.uth.tmc.edu/ontology/ochv#C0034030"}, {"group": 2, "id": "http://purl.bioontology.org/ontology/npo#NPO_1338", "label": "NPO_1338", "shape": "ellipse", "title": "http://purl.bioontology.org/ontology/npo#NPO_1338"}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "#888888", "dashes": true, "from": "http://purl.bioontology.org/ontology/npo#NPO_199", "label": "has property", "to": "http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#C93401"}, {"arrows": "to", "color": "#888888", "dashes": true, "from": "http://purl.bioontology.org/ontology/npo#NPO_199", "label": "has property", "to": "http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#C25464"}, {"arrows": "to", "color": "#888888", "dashes": true, "from": "http://purl.bioontology.org/ontology/npo#NPO_199", "label": "has property", "to": "http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#C43530"}, {"arrows": "to", "color": "#888888", "dashes": true, "from": "http://purl.bioontology.org/ontology/npo#NPO_199", "label": "has property", "to": "http://purl.bioontology.org/ontology/npo#NPO_1808"}, {"arrows": "to", "color": "#888888", "dashes": true, "from": "http://purl.bioontology.org/ontology/npo#NPO_199", "label": "has property", "to": "http://sbmi.uth.tmc.edu/ontology/ochv#C0034030"}, {"arrows": "to", "color": "#888888", "dashes": true, "from": "http://purl.bioontology.org/ontology/npo#NPO_199", "label": "has property", "to": "http://purl.obolibrary.org/obo/MESH_D012306"}, {"arrows": "to", "color": "#888888", "dashes": true, "from": "http://purl.bioontology.org/ontology/npo#NPO_199", "label": "has property", "to": "http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#C93400"}, {"arrows": "to", "color": "#888888", "dashes": true, "from": "http://purl.bioontology.org/ontology/npo#NPO_199", "label": "has property", "to": "http://purl.org/dc/terms/description"}, {"arrows": "to", "color": "#888888", "dashes": true, "from": "http://purl.bioontology.org/ontology/npo#NPO_199", "label": "has property", "to": "http://purl.obolibrary.org/obo/CHMO_0000101"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": true,
        "filter": [
            "physics"
        ]
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "barnesHut": {
            "avoidOverlap": 0,
            "centralGravity": 0.3,
            "damping": 0.09,
            "gravitationalConstant": -80000,
            "springConstant": 0.001,
            "springLength": 200
        },
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  
                  // if this network requires displaying the configure window,
                  // put it in its div
                  options.configure["container"] = document.getElementById("config");
                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
